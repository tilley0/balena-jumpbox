version: "2.1"

volumes:
  leases:

services:
  wifi-ap:
    build: ./wifi-ap
    network_mode: host
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - AP_SSID=${AP_SSID:-ct-jump}
      - AP_PASSWORD=${AP_PASSWORD}
      - AP_CHANNEL=${AP_CHANNEL:-6}
      - AP_INTERFACE=${AP_INTERFACE:-wlan1}
      - AP_IP=${AP_IP:-10.0.0.1}
      - AP_NETMASK=${AP_NETMASK:-255.255.255.0}
      - AP_DHCP_RANGE=${AP_DHCP_RANGE:-10.0.0.10,10.0.0.50,12h}
      - ETH_INTERFACE=${ETH_INTERFACE:-eth0}
    labels:
      io.balena.features.kernel-modules: "1"

  dhcp:
    build: ./dhcp
    network_mode: host
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
    volumes:
      - leases:/data/leases
    environment:
      - ETH_INTERFACE=${ETH_INTERFACE:-eth0}
      - ETH_IP=${ETH_IP:-192.168.100.1}
      - ETH_NETMASK=${ETH_NETMASK:-255.255.255.0}
      - ETH_DHCP_RANGE=${ETH_DHCP_RANGE:-192.168.100.10,192.168.100.200,12h}
      - ETH_DNS=${ETH_DNS:-8.8.8.8,8.8.4.4}

  ssh-jumpbox:
    build: ./ssh-jumpbox
    network_mode: host
    restart: always
    volumes:
      - leases:/data/leases:ro
    environment:
      - SSH_PASSWORD=${SSH_PASSWORD}
      - SSH_PORT=${SSH_PORT:-22222}
    labels:
      io.balena.features.balena-socket: "1"

  wifi-manager:
    build: ./wifi-manager
    network_mode: host
    restart: always
    labels:
      io.balena.features.dbus: "1"
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/host/run/dbus/system_bus_socket
      - MGMT_WIFI_SSID=${MGMT_WIFI_SSID}
      - MGMT_WIFI_PASSWORD=${MGMT_WIFI_PASSWORD}
      - MGMT_WIFI_INTERFACE=${MGMT_WIFI_INTERFACE:-wlan0}

  dashboard:
    build: ./dashboard
    network_mode: host
    restart: always
    volumes:
      - leases:/data/leases:ro
    environment:
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8080}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-${SSH_PASSWORD}}
