version: "2.1"

volumes:
  leases:

services:
  wifi-ap:
    build: ./wifi-ap
    network_mode: host
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - AP_SSID
      - AP_PASSWORD
      - AP_CHANNEL
      - AP_INTERFACE
      - AP_IP
      - AP_NETMASK
      - AP_DHCP_RANGE
      - ETH_INTERFACE
    labels:
      io.balena.features.kernel-modules: "1"

  dhcp:
    build: ./dhcp
    network_mode: host
    privileged: true
    restart: always
    cap_add:
      - NET_ADMIN
    volumes:
      - leases:/data/leases
    environment:
      - ETH_INTERFACE
      - ETH_IP
      - ETH_NETMASK
      - ETH_DHCP_RANGE
      - ETH_DNS

  ssh-jumpbox:
    build: ./ssh-jumpbox
    network_mode: host
    restart: always
    volumes:
      - leases:/data/leases:ro
    environment:
      - SSH_PASSWORD
      - SSH_PORT
    labels:
      io.balena.features.balena-socket: "1"

  wifi-manager:
    build: ./wifi-manager
    network_mode: host
    restart: always
    labels:
      io.balena.features.dbus: "1"
    environment:
      - DBUS_SYSTEM_BUS_ADDRESS=unix:path=/host/run/dbus/system_bus_socket
      - MGMT_WIFI_SSID
      - MGMT_WIFI_PASSWORD
      - MGMT_WIFI_INTERFACE
      - ETH_INTERFACE
      - AP_INTERFACE

  dashboard:
    build: ./dashboard
    network_mode: host
    restart: always
    volumes:
      - leases:/data/leases:ro
    environment:
      - DASHBOARD_PORT
      - DASHBOARD_USER
      - DASHBOARD_PASSWORD
      - SSH_PASSWORD
